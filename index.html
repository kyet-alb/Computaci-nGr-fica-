<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creacion de Circulo</title>
</head>
<body>
    <h2>Dibujo de un circulo</h2>
    <h3>Trabajo realizado por: <br> ARENAS LLAMOCCA KYET ALBERT</h3>
    <!--definir un area de dibujo en el elemento canvas -->
    <canvas id="myCanvas" width="500" height="500" style="border: 1px solid #000000;">
        Tu navegador no soporta el elemento canvas
    </canvas>
    <!-- codigo javascript-->
    <script>
        //Obtener contexto del dibujo de canvas
        var canvas = document.getElementById("myCanvas");

        //se obtiene el contexto de dibujo en 2D
        var ctx = canvas.getContext("2d");

        //Comenzar el trazado de un (circulo en este punto se inicia el dibujo)
        ctx.beginPath();

        //dibujar el arco para representar el circulo
        // las coordenadas (x, y) para que ubique el centro
        //el radio del circulo es de 100 pixeles
        ctx.arc(250, 250, 100, 0, 2 * Math.PI);

        //definir el color del relleno
        ctx.fillStyle = "red";
        ctx.fill();

        //dibujar el borde el circulo con color diferente
        ctx.stroke();     
    </script>
</body>
</html>
